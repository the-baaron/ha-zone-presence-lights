blueprint:
  name: Zone Presence Lights
  description: >-
    Presence-based light automation with lux-based darkness detection.

    Activation (when override is Auto):
      Lights turn on when presence is detected and it's dark (lux ≤ threshold),
      or when lux drops below threshold while presence is already active.
      Evening scene (05:00–00:00), night scene (00:00–05:00, if configured).

    Timeout — evening only (05:00–00:00):
      Presence lost → off-delay → dim scene (optional) → dim timeout → off.
      At night (00:00–05:00): presence lost → immediate off.

    Daylight:
      When lux rises above threshold, lights turn off automatically.

    Manual control:
      Manual on  → "Forced on"  until 00:00 or 12:00.
      Manual off → "Forced off" until 00:00 or 12:00.
  domain: automation
  input:
    presence_sensor:
      name: Presence sensor
      selector:
        entity:
          domain: binary_sensor

    zone_lights:
      name: Zone lights
      selector:
        entity:
          domain: light
          multiple: true

    illuminance_sensor:
      name: Illuminance sensor
      description: Lux sensor for darkness detection (typically built into the presence sensor).
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    illuminance_threshold:
      name: Darkness threshold (lux)
      description: Lights activate at or below this value.
      default: 50
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: lx

    evening_scene:
      name: Evening scene
      description: Scene to activate when dark (05:00–00:00).
      selector:
        entity:
          domain: scene

    night_scene:
      name: Night scene (optional)
      description: Scene for 00:00–05:00. If not set, lights stay off at night.
      default: {}
      selector:
        entity:
          domain: scene

    dim_scene:
      name: Dim scene (optional)
      description: >-
        Activated after the off-delay (evening only). Starts a second countdown
        before lights fully turn off. If not set, lights turn off directly after
        the off-delay.
      default: {}
      selector:
        entity:
          domain: scene

    dim_timeout:
      name: Dim timeout (minutes)
      description: How long to hold the dim scene before turning off.
      default: 60
      selector:
        number:
          min: 1
          max: 240
          unit_of_measurement: min

    override_mode:
      name: Override mode (optional)
      description: >-
        Input select helper with options: Auto, Forced on, Forced off.
        Set automatically on manual light changes. Resets to Auto at 00:00 and 12:00.
      default: {}
      selector:
        entity:
          domain: input_select

    fade_time:
      name: Fade time (seconds)
      description: Transition time for all light changes.
      default: 60
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: s

    normal_off_delay:
      name: Off delay — evening (minutes)
      description: Wait time after presence is lost before dimming/off (05:00–00:00).
      default: 30
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: min

variables:
  zone_lights_var: !input zone_lights
  night_scene_var: !input night_scene
  dim_scene_var: !input dim_scene
  override_var: !input override_mode
  illuminance_sensor_var: !input illuminance_sensor
  illuminance_threshold_var: !input illuminance_threshold
  normal_off_delay_min: !input normal_off_delay

triggers:
- trigger: state
  entity_id: !input presence_sensor
  to: 'on'
  id: presence_on
- trigger: state
  entity_id: !input presence_sensor
  to: 'off'
  id: presence_off
- trigger: state
  entity_id: !input zone_lights
  to: 'off'
  id: light_off
- trigger: state
  entity_id: !input zone_lights
  to: 'on'
  id: light_on
- trigger: numeric_state
  entity_id: !input illuminance_sensor
  above: !input illuminance_threshold
  id: became_bright
- trigger: numeric_state
  entity_id: !input illuminance_sensor
  below: !input illuminance_threshold
  id: became_dark
- trigger: time
  at: '00:00:00'
  id: reset
- trigger: time
  at: '12:00:00'
  id: reset

conditions: []

actions:
- choose:

  # Presence detected — activate if lights already on (dim phase) or it's dark
  - conditions:
    - condition: trigger
      id: presence_on
    - condition: template
      value_template: >-
        {{ expand(zone_lights_var) | selectattr('state', 'eq', 'on') | list | count > 0
           or states(illuminance_sensor_var) | int(0) <= illuminance_threshold_var | int }}
    - condition: template
      value_template: "{{ override_var == {} or is_state(override_var, 'Auto') }}"
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ now().hour >= 5 }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: !input evening_scene
          data:
            transition: !input fade_time
      - conditions:
        - condition: template
          value_template: "{{ now().hour < 6 and night_scene_var != {} }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: "{{ night_scene_var }}"
          data:
            transition: !input fade_time

  # Got dark while presence is already active — activate scene
  - conditions:
    - condition: trigger
      id: became_dark
    - condition: state
      entity_id: !input presence_sensor
      state: 'on'
    - condition: template
      value_template: "{{ override_var == {} or is_state(override_var, 'Auto') }}"
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ now().hour >= 5 }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: !input evening_scene
          data:
            transition: !input fade_time
      - conditions:
        - condition: template
          value_template: "{{ now().hour < 6 and night_scene_var != {} }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: "{{ night_scene_var }}"
          data:
            transition: !input fade_time

  # Presence lost — run off sequence only if lights are on
  - conditions:
    - condition: trigger
      id: presence_off
    - condition: template
      value_template: "{{ expand(zone_lights_var) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
    - condition: template
      value_template: "{{ override_var == {} or is_state(override_var, 'Auto') }}"
    sequence:
    - choose:
      # Night (00:00-05:00): immediate off
      - conditions:
        - condition: template
          value_template: "{{ now().hour < 6 }}"
        sequence:
        - action: light.turn_off
          target:
            entity_id: !input zone_lights
          data:
            transition: !input fade_time
      # Evening (05:00-00:00): delay then optional dim then off
      default:
      - delay:
          minutes: "{{ normal_off_delay_min | int }}"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ dim_scene_var != {} }}"
          sequence:
          - action: scene.turn_on
            target:
              entity_id: "{{ dim_scene_var }}"
            data:
              transition: !input fade_time
          - delay:
              minutes: !input dim_timeout
      - action: light.turn_off
        target:
          entity_id: !input zone_lights
        data:
          transition: !input fade_time

  # Manual light off → Forced off
  - conditions:
    - condition: trigger
      id: light_off
    - condition: template
      value_template: "{{ override_var != {} }}"
    - condition: template
      value_template: "{{ trigger.to_state.context.user_id is not none }}"
    sequence:
    - action: input_select.select_option
      target:
        entity_id: "{{ override_var }}"
      data:
        option: Forced off

  # Manual light on → Forced on
  - conditions:
    - condition: trigger
      id: light_on
    - condition: template
      value_template: "{{ override_var != {} }}"
    - condition: template
      value_template: "{{ trigger.to_state.context.user_id is not none }}"
    sequence:
    - action: input_select.select_option
      target:
        entity_id: "{{ override_var }}"
      data:
        option: Forced on

  # Lux rose above threshold — turn off lights
  - conditions:
    - condition: trigger
      id: became_bright
    - condition: template
      value_template: "{{ override_var == {} or is_state(override_var, 'Auto') }}"
    sequence:
    - action: light.turn_off
      target:
        entity_id: !input zone_lights
      data:
        transition: !input fade_time

  # Midnight and noon — reset override to Auto
  - conditions:
    - condition: trigger
      id: reset
    - condition: template
      value_template: "{{ override_var != {} }}"
    sequence:
    - action: input_select.select_option
      target:
        entity_id: "{{ override_var }}"
      data:
        option: Auto

mode: restart
