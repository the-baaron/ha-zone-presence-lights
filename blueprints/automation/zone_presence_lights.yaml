blueprint:
  name: Zone Presence Lights
  description: >-
    Turns lights on when presence is detected and it's dark, off when you leave.
    Uses a lux sensor instead of sunset/sunrise — works on cloudy days and indoors.

    Night mode (00:00–06:00): lights snap on/off instantly, no delays.
    Default mode (06:00–00:00): configurable off-delay and optional dim phase.

    Manual on/off sets "Forced on" or "Forced off" until 00:00 or 12:00.
  domain: automation
  input:
    section_zone:
      name: Zone
      input:
        presence_sensor:
          name: Presence sensor
          selector:
            entity:
              domain: binary_sensor

        zone_lights:
          name: Lights
          selector:
            entity:
              domain: light
              multiple: true

    section_light_level:
      name: Light level
      input:
        illuminance_sensor:
          name: Brightness sensor
          description: Works with both indoor (presence sensor built-in) and outdoor lux sensors.
          selector:
            entity:
              domain: sensor
              device_class: illuminance

        illuminance_threshold:
          name: Darkness threshold (lux)
          description: Lights activate when lux is at or below this value.
          default: 50
          selector:
            number:
              min: 1
              max: 10000
              mode: box
              unit_of_measurement: lx

    section_scenes:
      name: Scenes
      input:
        default_scene:
          name: Default scene
          description: Activated when dark (06:00–00:00).
          selector:
            entity:
              domain: scene

        night_scene:
          name: Night scene
          description: Activated when dark (00:00–06:00). Leave empty to keep lights off at night.
          selector:
            entity:
              domain: scene

        dim_scene:
          name: Dim scene
          description: >-
            Optional. Activated after the off-delay expires — dims the lights
            before turning them off fully. Only applies during 06:00–00:00.
          selector:
            entity:
              domain: scene

    section_timing:
      name: Timing
      input:
        fade_time:
          name: Fade time (seconds)
          description: Transition duration for all light changes during 06:00–00:00. Night mode always snaps instantly.
          default: 60
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s

        normal_off_delay:
          name: Off delay (minutes)
          description: How long to wait after presence is lost before dimming or turning off (06:00–00:00).
          default: 30
          selector:
            number:
              min: 1
              max: 120
              unit_of_measurement: min

        dim_timeout:
          name: Dim timeout (minutes)
          description: How long to hold the dim scene before turning off fully. Only used when a dim scene is set.
          default: 60
          selector:
            number:
              min: 1
              max: 240
              unit_of_measurement: min

    section_override:
      name: Manual override
      collapsed: true
      input:
        override_mode:
          name: Override helper
          description: >-
            Optional. An input_select helper with options: Auto, Forced on, Forced off.
            Set automatically when you manually control the lights.
            Resets to Auto at 00:00 and 12:00.
          selector:
            entity:
              domain: input_select

variables:
  zone_lights_var: !input zone_lights
  night_scene_var: !input night_scene
  dim_scene_var: !input dim_scene
  override_var: !input override_mode
  illuminance_sensor_var: !input illuminance_sensor
  illuminance_threshold_var: !input illuminance_threshold
  normal_off_delay_min: !input normal_off_delay

triggers:
- trigger: state
  entity_id: !input presence_sensor
  to: 'on'
  id: presence_on
- trigger: state
  entity_id: !input presence_sensor
  to: 'off'
  id: presence_off
- trigger: state
  entity_id: !input zone_lights
  to: 'off'
  id: light_off
- trigger: state
  entity_id: !input zone_lights
  to: 'on'
  id: light_on
- trigger: numeric_state
  entity_id: !input illuminance_sensor
  above: !input illuminance_threshold
  id: became_bright
- trigger: numeric_state
  entity_id: !input illuminance_sensor
  below: !input illuminance_threshold
  id: became_dark
- trigger: time
  at: '00:00:00'
  id: reset
- trigger: time
  at: '12:00:00'
  id: reset

conditions: []

actions:
- choose:

  # Presence detected — activate if lights already on (dim phase) or it's dark
  - conditions:
    - condition: trigger
      id: presence_on
    - condition: template
      value_template: >-
        {{ expand(zone_lights_var) | selectattr('state', 'eq', 'on') | list | count > 0
           or states(illuminance_sensor_var) | int(0) <= illuminance_threshold_var | int }}
    - condition: template
      value_template: "{{ override_var is not string or is_state(override_var, 'Auto') }}"
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ now().hour >= 6 }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: !input default_scene
          data:
            transition: !input fade_time
      - conditions:
        - condition: template
          value_template: "{{ now().hour < 6 and night_scene_var is string }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: "{{ night_scene_var }}"

  # Got dark while presence is already active — activate scene
  - conditions:
    - condition: trigger
      id: became_dark
    - condition: state
      entity_id: !input presence_sensor
      state: 'on'
    - condition: template
      value_template: "{{ override_var is not string or is_state(override_var, 'Auto') }}"
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ now().hour >= 6 }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: !input default_scene
          data:
            transition: !input fade_time
      - conditions:
        - condition: template
          value_template: "{{ now().hour < 6 and night_scene_var is string }}"
        sequence:
        - action: scene.turn_on
          target:
            entity_id: "{{ night_scene_var }}"

  # Presence lost — run off sequence only if lights are on
  - conditions:
    - condition: trigger
      id: presence_off
    - condition: template
      value_template: "{{ expand(zone_lights_var) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
    - condition: template
      value_template: "{{ override_var is not string or is_state(override_var, 'Auto') }}"
    sequence:
    - choose:
      # Night (00:00-06:00): immediate off
      - conditions:
        - condition: template
          value_template: "{{ now().hour < 6 }}"
        sequence:
        - action: light.turn_off
          target:
            entity_id: !input zone_lights
      # Default (06:00-00:00): delay then optional dim then off
      default:
      - delay:
          minutes: "{{ normal_off_delay_min | int }}"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ dim_scene_var is string }}"
          sequence:
          - action: scene.turn_on
            target:
              entity_id: "{{ dim_scene_var }}"
            data:
              transition: !input fade_time
          - delay:
              minutes: !input dim_timeout
      - action: light.turn_off
        target:
          entity_id: !input zone_lights
        data:
          transition: !input fade_time

  # Manual light off → Forced off
  - conditions:
    - condition: trigger
      id: light_off
    - condition: template
      value_template: "{{ override_var is string }}"
    - condition: template
      value_template: "{{ trigger.to_state.context.user_id is not none }}"
    sequence:
    - action: input_select.select_option
      target:
        entity_id: "{{ override_var }}"
      data:
        option: Forced off

  # Manual light on → Forced on
  - conditions:
    - condition: trigger
      id: light_on
    - condition: template
      value_template: "{{ override_var is string }}"
    - condition: template
      value_template: "{{ trigger.to_state.context.user_id is not none }}"
    sequence:
    - action: input_select.select_option
      target:
        entity_id: "{{ override_var }}"
      data:
        option: Forced on

  # Lux rose above threshold — turn off lights
  - conditions:
    - condition: trigger
      id: became_bright
    - condition: template
      value_template: "{{ override_var is not string or is_state(override_var, 'Auto') }}"
    sequence:
    - action: light.turn_off
      target:
        entity_id: !input zone_lights
      data:
        transition: !input fade_time

  # Midnight and noon — reset override; midnight also hands off to night mode
  - conditions:
    - condition: trigger
      id: reset
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ override_var is string }}"
        sequence:
        - action: input_select.select_option
          target:
            entity_id: "{{ override_var }}"
          data:
            option: Auto
    # At midnight: if lights are on, transition to night mode or turn off
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ now().hour == 0 and expand(zone_lights_var) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
        sequence:
        - choose:
          # Presence active → activate night scene (or off if no night scene)
          - conditions:
            - condition: state
              entity_id: !input presence_sensor
              state: 'on'
            - condition: template
              value_template: "{{ night_scene_var is string }}"
            sequence:
            - action: scene.turn_on
              target:
                entity_id: "{{ night_scene_var }}"
          default:
          - action: light.turn_off
            target:
              entity_id: !input zone_lights

mode: restart
